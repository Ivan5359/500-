<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#00030a">
  <title>Lead Desk</title>
  <style>
    :root{--bg:#00030a;--panel:rgba(4,11,24,.92);--line:rgba(96,178,255,.2);--line2:rgba(95,242,255,.4);--text:#f6f9ff;--soft:#c6d5e8;--muted:#899bb3;--blue:#4ea4ff;--cyan:#5ff2ff;--green:#69ffbd;--yellow:#ffd166;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    *{box-sizing:border-box}body{margin:0;color:var(--text);background:radial-gradient(circle at 80% 8%,rgba(78,164,255,.14),transparent 26rem),linear-gradient(145deg,#000104,#020713 52%,#000104)}
    .top{position:sticky;top:0;z-index:5;display:flex;justify-content:space-between;gap:8px;align-items:center;padding:10px 12px;border-bottom:1px solid var(--line);background:rgba(0,3,10,.86);backdrop-filter:blur(16px)}
    .actions{display:flex;flex-wrap:wrap;gap:7px}.btn,a.btn{min-height:36px;padding:0 11px;border:1px solid var(--line);border-radius:9px;background:rgba(255,255,255,.04);color:var(--soft);display:inline-flex;align-items:center;justify-content:center;text-decoration:none;cursor:pointer}.primary{color:#001525!important;border:0!important;background:linear-gradient(135deg,var(--cyan),var(--blue))!important;font-weight:900}
    main{width:min(1180px,100%);margin:0 auto;padding:16px}.hero{display:grid;grid-template-columns:minmax(0,1fr) minmax(320px,.8fr);gap:14px}.panel{border:1px solid var(--line);border-radius:12px;background:linear-gradient(180deg,var(--panel),rgba(0,3,10,.96));box-shadow:0 28px 90px rgba(0,0,0,.45);padding:18px}
    h1{font-size:clamp(36px,7vw,64px);line-height:.95;margin:8px 0 10px}.lead{color:var(--soft);font-size:17px;line-height:1.5}.chip{display:inline-flex;align-items:center;min-height:30px;padding:0 9px;border:1px solid var(--line);border-radius:999px;color:var(--muted);font-size:12px}.version{color:var(--cyan);border-color:var(--line2)}
    .fields{display:grid;grid-template-columns:1fr 120px 110px;gap:8px;margin:10px 0}input,select,textarea{width:100%;min-height:40px;border:1px solid var(--line);border-radius:9px;background:rgba(0,0,0,.25);color:var(--text);padding:0 10px;font:inherit}textarea{min-height:150px;padding:10px;line-height:1.45}.niches,.filters{display:flex;flex-wrap:wrap;gap:7px;margin:9px 0}.niches button,.filters button{min-height:32px;border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.04);color:var(--soft);padding:0 10px}.niches button.active,.filters button.active{background:linear-gradient(135deg,var(--cyan),var(--blue));color:#001525;border:0;font-weight:900}
    .grid{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(320px,.9fr);gap:14px;margin-top:14px}.list{display:grid;gap:9px}.card{border:1px solid var(--line);border-radius:10px;background:rgba(0,0,0,.24);padding:12px;display:grid;gap:9px;cursor:pointer}.card:hover{border-color:var(--line2)}.card-top{display:flex;justify-content:space-between;gap:10px}.title b{display:block}.title span{display:block;color:var(--muted);font-size:12px;margin-top:4px;overflow-wrap:anywhere}.score{min-width:50px;height:30px;display:grid;place-items:center;border:1px solid var(--line);border-radius:999px;color:var(--cyan)}.row{display:flex;flex-wrap:wrap;gap:6px}.mini{min-height:30px;padding:0 9px;border:1px solid var(--line);border-radius:8px;background:rgba(0,0,0,.18);color:var(--soft)}
    .log{max-height:260px;overflow:auto;display:grid;gap:7px}.log div{border:1px solid var(--line);border-radius:8px;background:rgba(0,0,0,.22);padding:8px;color:var(--muted);font-size:12px}.modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.72);padding:12px;z-index:20}.modal.open{display:flex}.box{width:min(820px,100%);max-height:88vh;overflow:auto;border:1px solid var(--line2);border-radius:12px;background:#020713;padding:16px}.detail{display:grid;gap:10px}.toast{position:fixed;right:12px;bottom:12px;display:grid;gap:7px;z-index:30}.toast div{padding:10px 12px;border:1px solid var(--line2);border-radius:9px;background:#051026;color:var(--soft)}
    @media(max-width:800px){.top{align-items:flex-start;flex-direction:column}.actions{display:grid;grid-template-columns:1fr 1fr;width:100%}.btn,a.btn{width:100%}.hero,.grid,.fields{grid-template-columns:1fr}main{padding:10px}.panel{padding:14px}}
  </style>
</head>
<body>
  <header class="top"><b>Lead Desk</b><div class="actions"><a class="btn" href="/presentation.html">Presentation</a><a class="btn" href="/guide.html">Guide</a><button class="btn" id="clear">Clear</button><button class="btn" id="test">Test</button><button class="btn primary" id="full">Full Auto</button></div></header>
  <main>
    <section class="hero">
      <div class="panel"><span class="chip version">SWISS_FINAL_20260617_1900</span><h1>Сканер</h1><p class="lead">Выбери город, радиус и ниши. Нажми Test для проверки API или Full Auto для поиска бизнесов.</p><p class="lead">Если видишь старые demo-бизнесы, нажми Clear.</p></div>
      <div class="panel"><div class="fields"><input id="city" value="Austin, TX"><select id="radius"><option value="10000">10 км</option><option value="20000" selected>20 км</option><option value="40000">40 км</option></select><select id="limit"><option>20</option><option selected>40</option><option>80</option></select></div><div class="niches" id="niches"></div><div class="actions"><button class="btn primary" id="scan">Scan</button><button class="btn" id="pack">Today Pack</button></div></div>
    </section>
    <section class="grid">
      <div class="panel"><div class="actions" style="justify-content:space-between"><h2 style="margin:0">Очередь</h2><div class="filters" id="filters"></div></div><div class="list" id="list"></div></div>
      <div class="panel"><h2 style="margin-top:0">Live Log</h2><div class="log" id="log"></div><h2>Script</h2><textarea id="script"></textarea></div>
    </section>
  </main>
  <div class="modal" id="modal"><div class="box"><div class="actions" style="justify-content:space-between"><h2 id="mt">Business</h2><button class="btn" onclick="modal.classList.remove('open')">Close</button></div><div class="detail" id="detail"></div></div></div>
  <div class="toast" id="toast"></div>
  <script>
    const VERSION='SWISS_FINAL_20260617_1900', STORE='lead-desk-final-v1';
    const $=id=>document.getElementById(id); const niches=[['roofing','Roofing'],['hvac','HVAC'],['painting','Painting'],['flooring','Flooring'],['fencing','Fencing'],['landscaping','Landscaping'],['remodeling','Remodeling'],['plumbing','Plumbing']];
    let state=JSON.parse(localStorage.getItem(STORE)||'{"leads":[],"selected":["roofing","hvac","painting","flooring"],"filter":"ready","log":[]}');
    function save(){localStorage.setItem(STORE,JSON.stringify(state))} function esc(x){return String(x||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
    function toast(x){const d=document.createElement('div');d.textContent=x;$('toast').appendChild(d);setTimeout(()=>d.remove(),3500)} function log(x){state.log.unshift(new Date().toLocaleTimeString()+' '+x);state.log=state.log.slice(0,80);save();renderLog()}
    function score(l){let s=20;if(l.website)s+=20;if(l.email)s+=20;if(l.phone)s+=10;if(l.status==='Sent')s+=5;return Math.min(99,s)}
    function msg(l){return `Hi, quick idea.\n\nMost contractors have old estimates that never got a clean second follow-up.\n\nI help turn those old estimates into a simple follow-up list: who to contact, what to say, and when to follow up.\n\nWant me to send the short version?`}
    async function apiScan(){const p=new URLSearchParams({city:$('city').value,radius:$('radius').value,limit:$('limit').value,niches:state.selected.join(',')});const r=await fetch('/api/scan?'+p,{cache:'no-store'});const j=await r.json();if(!r.ok||!j.ok)throw new Error(j.error||'scan failed');return j}
    async function scan(){log('Scan started');try{const j=await apiScan();const before=state.leads.length;const seen=new Set(state.leads.map(l=>l.id));(j.leads||[]).forEach(l=>{if(!seen.has(l.id)){seen.add(l.id);state.leads.unshift(l)}});save();render();log('Scan OK '+(state.leads.length-before)+' new via '+j.endpoint);toast('Scan OK: '+(state.leads.length-before)+' новых')}catch(e){log('Scan failed '+e.message);toast('Scan failed: '+e.message)}}
    function openLead(id){const l=state.leads.find(x=>x.id===id); if(!l)return; $('mt').textContent=l.name; const contact=l.email?`https://mail.google.com/mail/?view=cm&fs=1&to=${encodeURIComponent(l.email)}&su=${encodeURIComponent('Quick idea')}&body=${encodeURIComponent(msg(l))}`:(l.website||`https://www.google.com/search?q=${encodeURIComponent(l.name+' '+l.city+' email contact')}`);$('detail').innerHTML=`<p>${esc(l.niche)} · ${score(l)}</p><p>${esc(l.address||'')}</p><div class="actions"><a class="btn primary" href="${esc(contact)}" target="_blank">Open contact</a><button class="btn" id="copyMsg">Copy</button><button class="btn" id="sent">Mark Sent</button></div><textarea readonly>${esc(msg(l))}</textarea><p>Email: ${esc(l.email||'not found')}</p><p>Phone: ${esc(l.phone||'optional')}</p><p>Website: ${l.website?`<a href="${esc(l.website)}" target="_blank">${esc(l.website)}</a>`:'not found'}</p>`;$('copyMsg').onclick=()=>navigator.clipboard.writeText(msg(l)).then(()=>toast('Copied'));$('sent').onclick=()=>{l.status='Sent';save();render();toast('Sent saved')};$('modal').classList.add('open');$('script').value=msg(l)}
    function renderNiches(){nichesEl.innerHTML=niches.map(n=>`<button class="${state.selected.includes(n[0])?'active':''}" data-id="${n[0]}">${n[1]}</button>`).join('');[...nichesEl.children].forEach(b=>b.onclick=()=>{const id=b.dataset.id;state.selected=state.selected.includes(id)?state.selected.filter(x=>x!==id):state.selected.concat(id);save();renderNiches()})}
    function renderFilters(){filters.innerHTML=[['ready','Ready'],['sent','Sent'],['all','All']].map(f=>`<button class="${state.filter===f[0]?'active':''}" data-f="${f[0]}">${f[1]}</button>`).join('');[...filters.children].forEach(b=>b.onclick=()=>{state.filter=b.dataset.f;save();render()})}
    function show(l){if(state.filter==='all')return true;if(state.filter==='sent')return l.status==='Sent';return l.status!=='Sent'} function renderList(){const arr=state.leads.filter(show).sort((a,b)=>score(b)-score(a));list.innerHTML=arr.length?arr.map(l=>`<article class="card" data-id="${l.id}"><div class="card-top"><div class="title"><b>${esc(l.name)}</b><span>${esc(l.niche)} · ${esc(l.city)} · ${esc(l.email||l.website||'contact search')}</span></div><div class="score">${score(l)}</div></div><div class="row"><button class="mini">Open</button><span class="chip">${esc(l.source||'api')}</span><span class="chip">${esc(l.status||'Ready')}</span></div></article>`).join(''):'<div class="card">Пока пусто. Нажми Test или Full Auto.</div>';[...document.querySelectorAll('.card[data-id]')].forEach(c=>c.onclick=()=>openLead(c.dataset.id))}
    function renderLog(){logEl.innerHTML=state.log.length?state.log.map(x=>`<div>${esc(x)}</div>`).join(''):`<div>${VERSION} ready</div>`}
    function render(){renderNiches();renderFilters();renderList();renderLog();save()}
    $('full').onclick=scan;$('scan').onclick=scan;$('test').onclick=async()=>{log('Test started');try{const j=await apiScan();log('Test OK '+(j.leads||[]).length+' leads');toast('Test OK '+(j.leads||[]).length)}catch(e){log('Test failed '+e.message);toast('Test failed')}};$('clear').onclick=()=>{if(confirm('Clear local leads?')){state.leads=[];state.log=[];save();render();toast('Cleared')}};$('pack').onclick=()=>{$('script').value=state.leads.slice(0,10).map((l,i)=>`${i+1}. ${l.name} · ${l.email||l.website||'find contact'}\n${msg(l)}`).join('\n\n')};
    const nichesEl=$('niches'), filters=$('filters'), list=$('list'), logEl=$('log'), modal=$('modal'); render();
  </script>
</body>
</html>
